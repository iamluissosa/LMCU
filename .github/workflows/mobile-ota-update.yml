name: Mobile OTA Update

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - 'packages/**'

jobs:
  update:
    name: Expo Update
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: pnpm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🚀 Publish Update
        run: |
          cd apps/mobile
          npx eas-cli update --branch production --message "${{ github.event.head_commit.message }}"
        env:
          EXPO_PUBLIC_API_URL: "https://erp-lmcu-api-z1pc.onrender.com"
